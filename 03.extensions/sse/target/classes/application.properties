spring.application.name=sse-demo
server.port=8080

# SSE 응답 버퍼링 비활성화 (즉시 전송)
spring.mvc.async.request-timeout=-1

# 로그 레벨: SSE 프로토콜/메시지 구조를 명확히 보기 위해 DEBUG
logging.level.com.example.sse=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.SseEmitter=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
